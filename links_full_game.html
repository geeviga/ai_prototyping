const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const today=new Date().toDateString();
const savedData=JSON.parse(localStorage.getItem('links_game')||'{}');
const todayPlayed=savedData.date===today;
const chainIndex=savedData.date===today?savedData.chainIndex:Math.floor(Math.random()*CHAINS.length);

const App=()=>{
const[screen,setScreen]=React.useState(todayPlayed?'already':'tutorial');
const[tutStep,setTutStep]=React.useState(0);
const[round,setRound]=React.useState(0);
const[score,setScore]=React.useState(todayPlayed?savedData.score:0);
const[chain]=React.useState(CHAINS[chainIndex]);
const[currentObj,setCurrentObj]=React.useState(chain.start);
const[timer,setTimer]=React.useState(30);
const[selected,setSelected]=React.useState(null);
const[showResult,setShowResult]=React.useState(false);
const[isCorrect,setIsCorrect]=React.useState(false);
const[options,setOptions]=React.useState([]);
const[history,setHistory]=React.useState([chain.start]);
const[correctAns,setCorrectAns]=React.useState(null);
const[animPulse,setAnimPulse]=React.useState(false);
const[streak]=React.useState(savedData.streak||0);
const timerRef=React.useRef(null);

React.useEffect(()=>{
if(screen==='playing'&&timer>0&&!showResult){
timerRef.current=setTimeout(()=>setTimer(t=>t-1),1000);
return()=>clearTimeout(timerRef.current);
}
if(timer===0&&screen==='playing'&&!showResult)handleTimeout();
},[timer,screen,showResult]);

React.useEffect(()=>{
if(screen==='playing'&&!showResult&&round<chain.rounds.length){
const r=chain.rounds[round];
const mainCorrect=r.correct[Math.floor(Math.random()*r.correct.length)];
setCorrectAns(mainCorrect);
let opts=[{...mainCorrect,isCorrect:true},{...r.wild,isCorrect:false}];
const others=shuffle(r.correct.filter(c=>c.obj!==mainCorrect.obj)).slice(0,2);
others.forEach(o=>opts.push({...o,isCorrect:true}));
setOptions(shuffle(opts));
}
},[round,screen,showResult]);

const handleTimeout=()=>{setIsCorrect(false);setShowResult(true);};
const handleSelect=(opt,idx)=>{
if(showResult)return;
clearTimeout(timerRef.current);
setSelected(idx);
setAnimPulse(true);
setTimeout(()=>setAnimPulse(false),300);
const correct=opt.isCorrect;
setIsCorrect(correct);
setShowResult(true);
if(correct){setScore(s=>s+1);setHistory(h=>[...h,opt.obj]);}
};
const nextRound=()=>{
if(!isCorrect||round>=9){
const finalScore=isCorrect?score+1:score;
const newStreak=finalScore===10?(streak+1):0;
localStorage.setItem('links_game',JSON.stringify({date:today,chainIndex,score:finalScore,streak:newStreak,history}));
setScreen('result');
if(finalScore===10)triggerCelebration();
return;
}
setCurrentObj(options[selected].obj);
setRound(r=>r+1);
setTimer(30);
setSelected(null);
setShowResult(false);
};
const triggerCelebration=()=>{
const end=Date.now()+4000;
const colors=['#50abf6','#8acb5e','#f7b15b','#fc97b8','#c8a9fc','#73d4da'];
const frame=()=>{
confetti({particleCount:7,angle:60,spread:70,origin:{x:0},colors});
confetti({particleCount:7,angle:120,spread:70,origin:{x:1},colors});
if(Date.now()<end)requestAnimationFrame(frame);
};frame();
};
const getPct=()=>Math.round((score/10)*100);
const getMedal=()=>{
const p=getPct();
if(p===100)return{i:'🏆',l:'PERFECT!',c:'#f7b15b'};
if(p>=80)return{i:'🥇',l:'Gold',c:'#f7b15b'};
if(p>=50)return{i:'🥈',l:'Silver',c:'#c0c0c0'};
return{i:'🥉',l:'Bronze',c:'#cd7f32'};
};

e('div',{style:s.dots},[0,1,2].map(i=>e('div',{key:i,style:{...s.dot,background:i===tutStep?'#0a0a0b':'#d4ded3'}}))),
e('button',{style:s.btn,onClick:()=>tutStep<2?setTutStep(tutStep+1):setScreen('playing')},tutStep<2?'Next →':'Start Game →'),
tutStep>0&&e('button',{style:{...s.btn,...s.btnGhost,marginTop:8},onClick:()=>setTutStep(tutStep-1)},'← Back')
)
);
}

// PLAYING
if(screen==='playing'){
const timerPct=(timer/30)*100;
const timerColor=timer>10?'#8acb5e':timer>5?'#f7b15b':'#e78447';
return e('div',{style:s.wrap},
e('div',{style:s.head},
e('div',{style:s.logo},e('span',{style:{fontSize:20}},'🔗'),e('h1',{style:{...s.title,fontSize:18}},'Links')),
e('div',{style:{display:'flex',gap:6}},
e('span',{style:s.badge},`${round+1}/10`),
e('span',{style:{...s.badge,background:timerColor,color:timer<=5?'#fff':'#0a0a0b'}},`${timer}s`)
)
),
e('div',{style:s.body},
e('div',{style:s.timerWrap},
e('div',{style:s.timerBar},e('div',{style:{...s.timerFill,width:`${timerPct}%`,background:timerColor}})),
),
e('div',{style:s.chainTrack},
history.slice(-3).map((h,i,a)=>e(React.Fragment,{key:i},
e('span',{style:s.chainItem},h),
e('span',{style:s.chainArrow},'→')
)),
e('span',{style:{...s.chainItem,...s.chainNext}},'?')
),
e('div',{style:{...s.card,...(animPulse?s.cardPulse:{})}},
e('div',{style:s.cardLbl},'Find what links to'),
e('div',{style:s.cardTxt},currentObj)
),
e('p',{style:{fontSize:12,fontWeight:600,margin:'12px 0 8px',color:'#0a0a0b'}},'Select the next link:'),
options.map((opt,idx)=>{
let st={...s.optBtn};
if(showResult){
if(selected===idx)st=opt.isCorrect?{...st,...s.optOk}:{...st,...s.optBad};
else if(opt.isCorrect&&!isCorrect)st={...st,...s.optMuted};
}
return e('button',{key:idx,style:st,onClick:()=>handleSelect(opt,idx),disabled:showResult},
opt.obj,
showResult&&selected===idx&&e('span',{style:{fontSize:18}},opt.isCorrect?'✓':'✗')
);
}),
showResult&&e('div',{style:s.explain},
isCorrect?e('span',null,e('strong',null,'✅ Correct! '),options[selected].why):
e('span',null,e('strong',null,'❌ Chain broken! '),'The link was "',correctAns.obj,'" — ',correctAns.why)
),
showResult&&e('button',{style:s.btn,onClick:nextRound},isCorrect?(round>=9?'See Results →':'Continue →'):'See Results →')
)
);
}

// RESULTS
if(screen==='result'){
const m=getMedal();
const pct=getPct();
const finalHistory=history;
return e('div',{style:s.wrap},
e('div',{style:{...s.head,background:m.c}},
e('div',{style:s.logo},e('span',{style:{fontSize:20}},'🔗'),e('h1',{style:{...s.title,fontSize:18}},'Links')),
e('span',{style:s.badge},'Complete')
),
e('div',{style:s.center},
e('div',{style:s.medal},m.i),
e('h2',{style:s.resultTitle},pct===100?'PERFECT CHAIN!':m.l+'!'),
e('p',{style:s.resultSub},pct===100?'Every link connected!':pct>0?`${pct}% complete`:'Try again tomorrow!'),
e('div',{style:s.progDots},
Array.from({length:10}).map((_,i)=>e('div',{key:i,style:{...s.progDot,...(i<score?s.progOk:i===score&&!isCorrect?s.progBad:s.progEmpty)}},
i<score?'✓':i===score&&!isCorrect?'✗':''
))
),
e('div',{style:s.historyBox},
e('div',{style:s.historyLbl},'Your chain'),
e('div',{style:s.historyChain},
finalHistory.map((h,i)=>e(React.Fragment,{key:i},
e('span',{style:{...s.chainItem,fontSize:10,padding:'3px 7px'}},h),
i<finalHistory.length-1&&e('span',{style:{...s.chainArrow,fontSize:10}},'→')
))
)
),
e('button',{style:s.shareBtn,onClick:()=>{
const txt=`🔗 Links ${m.i} ${pct}%\n${finalHistory.join(' → ')}\n${'🟦'.repeat(score)}${'⬜'.repeat(10-score)}`;
if(navigator.share)navigator.share({text:txt});
else{navigator.clipboard.writeText(txt);alert('Copied!');}
}},'Share 📤'),
e('p',{style:s.footer},'🔔 New puzzle tomorrow at midnight')
)
);
}
return null;
};
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
