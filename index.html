          { card: "Antimicrobial", correct: "Salt", wrong: "Water", themeDay: null },
          { card: "Salt", correct: null, wrong: null, themeDay: null },
        ]
      }
    ];

    const THEME_DAYS = {
      "Ants Day": { headline: "Dig in with ants", sub: "The tiny creatures running the world beneath your feet.", color: "#5a2a08", bg: "#fdf3ec", accent: "#c45c1a", emoji: "🐜", facts: ["Ants have colonised almost every landmass on Earth.", "A single colony can contain millions of workers.", "Ants can carry up to 50 times their own body weight.", "Leafcutter ants farm fungi — they were farming long before humans."] },
      "Swimming Day": { headline: "Make a splash", sub: "Everything in the animal kingdom that glides, dives, and powers through water.", color: "#0c3d6e", bg: "#eef5fc", accent: "#1a5fa0", emoji: "🌊", facts: ["The sailfish is the fastest swimmer, reaching 110 km/h.", "Sea otters hold hands while sleeping so they don't drift apart.", "Polar bears can swim continuously for days.", "Dolphins sleep with one half of their brain at a time."] },
      "Deserts": { headline: "No water? No problem.", sub: "The driest places on Earth and the life that calls them home.", color: "#6b3a0a", bg: "#fdf7ee", accent: "#a05a1a", emoji: "🏜️", facts: ["The Atacama Desert in Chile receives less than 1mm of rain per year.", "Camels store fat in their humps, not water.", "The Sahara is roughly the size of the United States.", "Some desert plants can live for over 1,000 years without meaningful rainfall."] },
      "Tree Day": { headline: "Branch out", sub: "The oldest, tallest, and most well-travelled organisms on the planet.", color: "#1d4a18", bg: "#f0f7ee", accent: "#2d5a27", emoji: "🌳", facts: ["The oldest known living tree is over 5,000 years old.", "Trees communicate with each other through underground fungal networks.", "A single mature tree can absorb 22kg of CO2 per year.", "The Amazon rainforest contains around 390 billion individual trees."] },
      "Sea, See, C": { headline: "Sea, See, C", sub: "From ocean depths to vitamin C — a day full of surprising connections.", color: "#0c3057", bg: "#eef3fa", accent: "#1a4a7a", emoji: "🔵", facts: ["Vitamin C was discovered through the study of scurvy in sailors.", "The ocean covers more than 70% of Earth's surface.", "Sea buckthorn berries contain up to 15x the vitamin C of oranges.", "The C in vitamin C comes from the Latin word for scurvy: scorbutus."] },
      "Hot Potato": { headline: "Hot potato", sub: "Fast-moving, high-stakes, and hard to hold.", color: "#7a3010", bg: "#fdf1ec", accent: "#c04a20", emoji: "🥔", facts: ["The potato was brought to Europe from South America in the 16th century.", "Ireland's population fell by 25% during the Great Famine of the 1840s.", "Potatoes are about 80% water.", "There are over 5,000 varieties of potato worldwide."] },
      "Fuel Day": { headline: "Full tank", sub: "Everything that powers the world, from ancient oceans to modern engines.", color: "#1a1a3a", bg: "#eeeef8", accent: "#3a3a7a", emoji: "⛽", facts: ["Petroleum formed from marine organisms that died millions of years ago.", "The world uses roughly 100 million barrels of oil per day.", "Biofuels can be made from corn, sugarcane, and even algae.", "The first commercial oil well was drilled in Pennsylvania in 1859."] },
      "Clothes Day": { headline: "Thread count", sub: "From silkworms to synthetic fibres — how humans learned to dress themselves.", color: "#3a1a5a", bg: "#f5eefa", accent: "#7a3aaa", emoji: "👗", facts: ["Silk has been produced in China for at least 5,000 years.", "Cotton is the most widely used natural fibre in the world.", "The average person owns around 148 items of clothing.", "It takes about 2,700 litres of water to produce one cotton T-shirt."] },
      "Sticky Situation": { headline: "Stick with it", sub: "The surprising science and history of things that bind, trap, and hold together.", color: "#5a3a08", bg: "#fdf6e8", accent: "#a07010", emoji: "🍯", facts: ["Honey never spoils — pots found in Egyptian tombs were still edible.", "Bees visit around 2 million flowers to make one pound of honey.", "Spider silk is stronger than steel by weight.", "The first adhesive tape was invented in 1925 by Richard Drew at 3M."] }
    };

    const TUTORIAL_STEPS = [
      { emoji: "🔗", title: "Follow the chain", desc: "Each badge is a chain of connections. Your job is to find what links one thing to the next." },
      { emoji: "🤔", title: "Pick the real connection", desc: "You'll see two options. One is the true link — the other is a clever fake. Choose wisely!" },
      { emoji: "⏱️", title: "Beat the clock", desc: "You have 15 seconds per link. If time runs out, the chain breaks and you'll have to start over." },
      { emoji: "🏆", title: "Earn your badge", desc: "Complete all 10 links without breaking the chain to earn the badge. Ready to try?" }
    ];

    function shufflePair(a, b) { return Math.random() < 0.5 ? [a, b] : [b, a]; }

    function Confetti({ show }) {
      const colors = ['#8acb5e', '#50abf6', '#f7b15b', '#fc97b8', '#c8a9fc', '#73d4da'];
      const confettiPieces = Array.from({ length: 50 }, (_, i) => ({
        id: i, left: Math.random() * 100, delay: Math.random() * 0.5, duration: 2 + Math.random() * 2,
        color: colors[Math.floor(Math.random() * colors.length)], size: 6 + Math.random() * 8
      }));
      if (!show) return null;
      return (
        <div className="confetti-container">
          {confettiPieces.map(p => (
            <div key={p.id} className="confetti" style={{
              left: `${p.left}%`, width: p.size, height: p.size, background: p.color,
              borderRadius: Math.random() > 0.5 ? '50%' : '2px',
              animation: `confettiFall ${p.duration}s ease-out ${p.delay}s forwards`
            }} />
          ))}
        </div>
      );
    }

    function Timer({ seconds, maxSeconds }) {
      const radius = 12;
      const circumference = 2 * Math.PI * radius;
      const progress = seconds / maxSeconds;
      const dashOffset = circumference * (1 - progress);
      let colorClass = seconds <= 5 ? 'danger' : seconds <= 10 ? 'warning' : '';
      return (
        <div className="timer-wrap">
          <div className="timer-circle">
            <svg className="timer-svg" viewBox="0 0 32 32">
              <circle className="timer-bg" cx="16" cy="16" r={radius} />
              <circle className={`timer-fill ${colorClass}`} cx="16" cy="16" r={radius} strokeDasharray={circumference} strokeDashoffset={dashOffset} />
            </svg>
            <div className="timer-text">{seconds}</div>
          </div>
        </div>
      );
    }

    function ChainProgress({ totalNodes, currentStep, badge }) {
      const nodes = [];
      for (let i = 0; i < totalNodes; i++) {
        nodes.push(
          <div key={i} className="chain-node">
            <div className={`chain-dot ${i < currentStep ? 'complete' : ''} ${i === currentStep ? 'current' : ''} ${i > currentStep ? 'future' : ''}`} />
            {i < totalNodes - 1 && <div className={`chain-line ${i < currentStep ? 'complete' : ''}`} />}
          </div>
        );
      }
      nodes.push(<div key="end" className="chain-end">{badge.icon}</div>);
      return (
        <div className="chain-progress">
          <div className="chain-progress-header">
            <div className="chain-progress-label">Chain progress</div>
            <div className="chain-progress-count">{currentStep} of {totalNodes} links</div>
          </div>
          <div className="chain-nodes">{nodes}</div>
        </div>
      );
    }

    function TutorialModal({ onClose, onStartTutorialGame }) {
      const [step, setStep] = useState(0);
      const tutorialBadge = BADGES.find(b => b.id === 'bffs');
      const handleNext = () => step < TUTORIAL_STEPS.length - 1 ? setStep(step + 1) : onStartTutorialGame(tutorialBadge);
      const currentStep = TUTORIAL_STEPS[step];
      return (
        <div className="tutorial-overlay" onClick={onClose}>
          <div className="tutorial-modal" onClick={e => e.stopPropagation()}>
            <div className="tutorial-step-indicator">
              {TUTORIAL_STEPS.map((_, i) => <div key={i} className={`tutorial-step-dot ${i === step ? 'active' : ''} ${i < step ? 'complete' : ''}`} />)}
            </div>
            <div className="tutorial-content">
              <span className="tutorial-emoji">{currentStep.emoji}</span>
              <h3 className="tutorial-step-title">{currentStep.title}</h3>
              <p className="tutorial-step-desc">{currentStep.desc}</p>
              {step === 1 && (
                <div className="tutorial-example">
                  <div className="tutorial-example-label">Example</div>
                  <div className="tutorial-example-card"><div className="tutorial-example-card-text">Black pepper</div></div>
                  <div className="tutorial-example-opts">
                    <div className="tutorial-example-opt correct">Common in Roman cooking <span>✓</span></div>
                    <div className="tutorial-example-opt wrong">Used in pumpkin pie spice <span>✗</span></div>
                  </div>
                </div>
              )}
            </div>
            <div className="tutorial-btn-row">
              <button className="tutorial-btn secondary" onClick={onClose}>Skip</button>
              <button className="tutorial-btn primary" onClick={handleNext}>{step === TUTORIAL_STEPS.length - 1 ? 'Start playing' : 'Next'}</button>
            </div>
          </div>
        </div>
      );
    }

    function CelebrationScreen({ badge, onContinue }) {
      const [visibleNodes, setVisibleNodes] = useState(0);
      const [showBadge, setShowBadge] = useState(false);
      const [showConfetti, setShowConfetti] = useState(false);
      useEffect(() => {
        const nodeCount = badge.nodes.length;
        let current = 0;
        const interval = setInterval(() => {
          current++;
          setVisibleNodes(current);
          if (current >= nodeCount) {
            clearInterval(interval);
            setTimeout(() => { setShowBadge(true); setShowConfetti(true); }, 400);
          }
        }, 150);
        return () => clearInterval(interval);
      }, [badge]);
      return (
        <div className="celebration fade">
          <Confetti show={showConfetti} />
          {!showBadge ? (
            <div className="chain-build">
              <div className="chain-build-title">Building your chain...</div>
              <div className="chain-build-nodes">
                {badge.nodes.map((node, i) => (
                  <div key={i}>
                    <div className={`chain-build-node ${i < visibleNodes ? 'visible' : ''}`}>
                      <div className="chain-build-dot" />
                      <div className="chain-build-text">{node.card}</div>
                    </div>
                    {i < badge.nodes.length - 1 && i < visibleNodes - 1 && <div className="chain-build-line" style={{ marginLeft: '4px' }} />}
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <>
              <div className={`badge-reveal ${showBadge ? 'visible' : ''}`}>
                <span className="badge-icon-large">{badge.icon}</span>
                <div className="badge-congrats">Congratulations!</div>
                <div className="badge-name-large">{badge.name}</div>
                <div className="badge-earned-pill"><span>✓</span> Badge earned</div>
              </div>
              <button className="continue-btn" onClick={onContinue}>Continue</button>
            </>
          )}
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("select");
      const [badge, setBadge] = useState(null);
      const [step, setStep] = useState(0);
      const [chosen, setChosen] = useState(null);
      const [result, setResult] = useState(null);
      const [opts, setOpts] = useState([]);
      const [tdName, setTdName] = useState(null);
      const [returnTo, setReturnTo] = useState("select");
      const [showTutorial, setShowTutorial] = useState(false);
      const [showChain, setShowChain] = useState(false);
      const [showToast, setShowToast] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      const [timeLeft, setTimeLeft] = useState(15);
      const [timerPaused, setTimerPaused] = useState(true);
      const timerRef = useRef(null);
      const totalSteps = badge ? badge.nodes.length - 1 : 1;

      useEffect(() => {
        if (screen === 'game' && !timerPaused && !chosen) {
          timerRef.current = setInterval(() => {
            setTimeLeft(prev => {
              if (prev <= 1) { clearInterval(timerRef.current); handleTimeout(); return 0; }
              return prev - 1;
            });
          }, 1000);
        }
        return () => { if (timerRef.current) clearInterval(timerRef.current); };
      }, [screen, timerPaused, chosen, step]);

      const handleTimeout = () => { setChosen('timeout'); setResult('timeout'); setTimerPaused(true); };

      function startGame(b) {
        setBadge(b); setStep(0); setChosen(null); setResult(null);
        setOpts(shufflePair(b.nodes[0].correct, b.nodes[0].wrong));
        setTimeLeft(15); setTimerPaused(false); setScreen("game");
      }

      function handleAnswer(opt) {
        if (chosen) return;
        clearInterval(timerRef.current);
        setTimerPaused(true);
        const isCorrect = opt === badge.nodes[step].correct;
        setChosen(opt);
        setResult(isCorrect ? "correct" : "wrong");
        if (isCorrect) {
          setTimeout(() => {
            const next = step + 1;
            if (!badge.nodes[next].correct) { setScreen("celebrate"); }
            else {
              setStep(next); setChosen(null); setResult(null);
              setOpts(shufflePair(badge.nodes[next].correct, badge.nodes[next].wrong));
              setTimeLeft(15); setTimerPaused(false);
            }
          }, 600);
        }
      }

      function goThemeDay(name, from) { setTdName(name); setReturnTo(from); setScreen("themeday"); }
      function showToastMessage(msg) { setToastMessage(msg); setShowToast(true); setTimeout(() => setShowToast(false), 3000); }
      function handleSetReminder() { showToastMessage('⏰ Reminder set for tomorrow!'); }
      function handleShare() {
        const text = `I just earned the "${badge.name}" badge on Spark! 🔗`;
        if (navigator.share) { navigator.share({ text }); }
        else { navigator.clipboard.writeText(text); showToastMessage('📋 Copied to clipboard!'); }
      }

      const td = tdName ? THEME_DAYS[tdName] : null;

      return (
        <div className="root">
          <div className="wrap">
            <div className="wordmark">Spark</div>

            {screen === "select" && (
              <div className="fade">
                <h1 className="sel-title">Earn your<br />weekly badge.</h1>
                <p className="sel-sub">Follow the chain. One answer is false. Don't break it.</p>
                <div className="tutorial-card" onClick={() => setShowTutorial(true)}>
                  <div className="tutorial-header">
                    <span className="tutorial-icon">🎓</span>
                    <span className="tutorial-badge">New to Links?</span>
                  </div>
                  <div className="tutorial-title">Learn how to play</div>
                  <div className="tutorial-desc">Quick walkthrough using the BFFs badge</div>
                  <div className="tutorial-cta">Start tutorial →</div>
                </div>
                <div className="section-label">Choose a badge</div>
                <div className="badge-grid">
                  {BADGES.map(b => (
                    <div key={b.id} className="badge-card" onClick={() => startGame(b)}>
                      <span className="b-icon">{b.icon}</span>
                      <div className="b-name">{b.name}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {showTutorial && (
              <TutorialModal onClose={() => setShowTutorial(false)} onStartTutorialGame={(b) => { setShowTutorial(false); startGame(b); }} />
            )}

            {screen === "game" && badge && (
              <div className="fade">
                <div className="g-header">
                  <button className="back-btn" onClick={() => { clearInterval(timerRef.current); setScreen("select"); }}>← Badges</button>
                  <Timer seconds={timeLeft} maxSeconds={15} />
                </div>
                <ChainProgress totalNodes={totalSteps} currentStep={step} badge={badge} />
                <div className="node-card">
                  <div className="node-name">{badge.nodes[step].card}</div>
                  <div className="node-q">What connects?</div>
                </div>
                <div className="options">
                  {opts.map(opt => {
                    let cls = "opt";
                    if (chosen && chosen !== 'timeout') {
                      if (opt === badge.nodes[step].correct) cls += " correct";
                      else if (opt === chosen) cls += " wrong";
                    }
                    if (chosen === 'timeout' && opt === badge.nodes[step].correct) cls += " correct";
                    return <button key={opt} className={cls} onClick={() => handleAnswer(opt)} disabled={!!chosen}>{opt}</button>;
                  })}
                </div>
                {result === "wrong" && (
                  <>
                    <div className="feedback wrong">Not quite — "{badge.nodes[step].correct}" was the real connection.</div>
                    <button className="next-btn danger" onClick={() => setScreen("select")}>Try again</button>
                  </>
                )}
                {result === "timeout" && (
                  <>
                    <div className="feedback timeout">Time's up! The answer was "{badge.nodes[step].correct}".</div>
                    <button className="next-btn danger" onClick={() => setScreen("select")}>Try again</button>
                  </>
                )}
              </div>
            )}

            {screen === "celebrate" && badge && <CelebrationScreen badge={badge} onContinue={() => setScreen("win")} />}

            {screen === "win" && badge && (
              <div className="fade">
                <div className="win-header">
                  <span className="win-icon">{badge.icon}</span>
                  <h2 className="win-title">{badge.name}</h2>
                  <div className="win-badge-pill"><span>✓</span> Badge earned</div>
                </div>
                <div className="win-actions">
                  <div className="win-action" onClick={() => setScreen("select")}>
                    <span className="win-action-icon">🎮</span>
                    <div className="win-action-content">
                      <div className="win-action-title">Play another badge</div>
                      <div className="win-action-desc">Try a different chain</div>
                    </div>
                    <span className="win-action-arrow">→</span>
                  </div>
                  <div className="win-action" onClick={handleSetReminder}>
                    <span className="win-action-icon">⏰</span>
                    <div className="win-action-content">
                      <div className="win-action-title">Remind me tomorrow</div>
                      <div className="win-action-desc">New badges drop daily</div>
                    </div>
                    <span className="win-action-arrow">→</span>
                  </div>
                  <div className="win-action" onClick={handleShare}>
                    <span className="win-action-icon">📤</span>
                    <div className="win-action-content">
                      <div className="win-action-title">Share your result</div>
                      <div className="win-action-desc">Brag to your friends</div>
                    </div>
                    <span className="win-action-arrow">→</span>
                  </div>
                </div>
                <button className="win-chain-toggle" onClick={() => setShowChain(!showChain)}>
                  {showChain ? 'Hide chain ↑' : 'View the full chain ↓'}
                </button>
                {showChain && (
                  <div className="chain-list">
                    <div className="chain-label">The full chain</div>
                    {badge.nodes.map((node, i) => (
                      <div key={i} className="chain-row">
                        <div className="chain-col">
                          <div className="chain-dot-sm" />
                          {i < badge.nodes.length - 1 && <div className="chain-line-v" />}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div className="chain-text">{node.card}</div>
                          {node.themeDay && THEME_DAYS[node.themeDay] && (
                            <button className="theme-tag" style={{ color: THEME_DAYS[node.themeDay].color }} onClick={() => goThemeDay(node.themeDay, "win")}>
                              <span>{THEME_DAYS[node.themeDay].emoji}</span>{node.themeDay} →
                            </button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {screen === "themeday" && td && (
              <div className="fade">
                <button className="td-back" onClick={() => setScreen(returnTo)}>← Back</button>
                <div className="td-hero" style={{ background: td.bg }}>
                  <span className="td-emoji">{td.emoji}</span>
                  <div className="td-headline" style={{ color: td.color }}>{td.headline}</div>
                  <div className="td-desc" style={{ color: td.color }}>{td.sub}</div>
                </div>
                <div className="td-facts">
                  {td.facts.map((f, i) => <div key={i} className="td-fact"><span className="td-num">{i + 1}</span><span>{f}</span></div>)}
                </div>
                <button className="td-cta" style={{ background: td.bg }} onClick={() => setScreen(returnTo)}>Back to chain →</button>
              </div>
            )}
          </div>
          {showToast && <div className="toast">{toastMessage}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
