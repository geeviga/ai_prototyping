    .back-btn { font-size: 13px; color: #b5a99a; background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: color 0.15s; padding: 0; }

    .step-label { font-size: 12px; color: #8a8070; font-weight: 500; }

    .path-nodes { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }

    .path-current { background: #50abf6; border-color: #2d8ad8; color: #0a0a0b; }

    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
    .confetti { position: absolute; opacity: 0; }

      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }

    .chain-reveal-text { font-size: 14px; color: #0a0a0b; font-weight: 500; padding: 6px 0; }
    .chain-reveal-line { width: 2px; height: 12px; background: #d4f0c0; margin-left: 4px; }

    // Clean display name (remove disambiguation suffixes)
    function displayName(node) {
      return node.replace(/ \(.*\)$/, '');
    }

    // Check if node is terminal
    function isTerminal(node) {
      return BADGES[node] !== undefined;
    }

    // Shuffle array
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function Confetti({ show }) {
      const colors = ['#8acb5e', '#50abf6', '#f7b15b', '#fc97b8', '#c8a9fc', '#73d4da'];
      const pieces = Array.from({ length: 60 }, (_, i) => ({
        id: i,
        left: Math.random() * 100,
        delay: Math.random() * 0.8,
        duration: 2.5 + Math.random() * 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 8 + Math.random() * 10,
        shape: Math.random() > 0.5 ? '50%' : '2px'
      }));
      if (!show) return null;
      return (
        <div className="confetti-container">
          {pieces.map(p => (
            <div key={p.id} className="confetti" style={{
              left: `${p.left}%`,
              width: p.size,
              height: p.size,
              background: p.color,
              borderRadius: p.shape,
              animation: `confettiFall ${p.duration}s ease-out ${p.delay}s forwards`
            }} />
          ))}
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("intro");
      const [path, setPath] = useState(["Black pepper"]);
      const [showConfetti, setShowConfetti] = useState(false);
      const [visibleChainNodes, setVisibleChainNodes] = useState(0);

      const currentNode = path[path.length - 1];
      const options = GRAPH[currentNode] || [];
      const isEnd = isTerminal(currentNode);
      const badge = isEnd ? BADGES[currentNode] : null;

      function startGame() {
        setPath(["Black pepper"]);
        setShowConfetti(false);
        setVisibleChainNodes(0);
        setScreen("game");
      }

      function selectOption(opt) {
        const newPath = [...path, opt.next];
        setPath(newPath);
        
        if (isTerminal(opt.next)) {
          setScreen("result");
          setShowConfetti(true);
          // Animate chain reveal
          let count = 0;
          const interval = setInterval(() => {
            count++;
            setVisibleChainNodes(count);
            if (count >= newPath.length) clearInterval(interval);
          }, 120);
        }
      }

      function playAgain() {
        setPath(["Black pepper"]);
        setShowConfetti(false);
        setVisibleChainNodes(0);
        setScreen("game");
      }

      const allBadges = Object.values(BADGES);

      return (
        <div className="root">
          <div className="wrap">
            <div className="wordmark">Spark</div>

            {screen === "intro" && (
              <div className="fade">
                <div className="intro-card">
                  <span className="intro-emoji">🔗</span>
                  <h1 className="intro-title">Build your chain</h1>
                  <p className="intro-desc">
                    Start from Black pepper and follow the connections. Each choice opens a new path. Where you end up determines which badge you earn.
                  </p>
                  <div className="intro-badges">
                    {allBadges.map(b => (
                      <div key={b.id} className="intro-badge">
                        <span>{b.icon}</span>
                        <span>{b.name}</span>
                      </div>
                    ))}
                  </div>
                  <button className="start-btn" onClick={startGame}>Start building →</button>
                </div>
              </div>
            )}

            {screen === "game" && (
              <div className="fade" key={currentNode}>
                <div className="g-header">
                  <button className="back-btn" onClick={() => setScreen("intro")}>← Back</button>
                  <span className="step-label">{path.length} link{path.length !== 1 ? 's' : ''}</span>
                </div>

                <div className="path-display">
                  <div className="path-label">Your chain</div>
                  <div className="path-nodes">
                    {path.map((node, i) => (
                      <React.Fragment key={i}>
                        {i > 0 && <span className="path-arrow">→</span>}
                        <span className={`path-node ${i === path.length - 1 ? 'path-current' : ''}`}>
                          {displayName(node)}
                        </span>
                      </React.Fragment>
                    ))}
                  </div>
                </div>

                <div className="node-card">
                  <div className="node-name">{displayName(currentNode)}</div>
                  <div className="node-q">What connects?</div>
                </div>

                <div className="options">
                  {shuffle(options).map((opt, i) => (
                    <button key={i} className="opt" onClick={() => selectOption(opt)}>
                      <span>{opt.text}</span>
                      <span className="opt-arrow">→</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {screen === "result" && badge && (
              <div className="celebration fade">
                <Confetti show={showConfetti} />
                
                <div className="result-card">
                  <span className="result-icon">{badge.icon}</span>
                  <div className="result-congrats">You earned</div>
                  <div className="result-badge-name">{badge.name}</div>
                  <div className="result-pill">
                    <span>✓</span> Badge unlocked
                  </div>
                </div>

                <div className="chain-reveal">
                  <div className="chain-reveal-label">Your path</div>
                  <div className="chain-reveal-nodes">
                    {path.map((node, i) => (
                      <React.Fragment key={i}>
                        <div className={`chain-reveal-row ${i < visibleChainNodes ? 'visible' : ''}`}>
                          <div className={`chain-reveal-dot ${i === path.length - 1 ? 'end' : ''}`} />
                          <div className="chain-reveal-text">{displayName(node)}</div>
                        </div>
                        {i < path.length - 1 && i < visibleChainNodes - 1 && (
                          <div className="chain-reveal-line" />
                        )}
                      </React.Fragment>
                    ))}
                  </div>
                </div>

                <div className="cta-section">
                  <button className="cta-primary" onClick={playAgain}>
                    Build a different chain →
                  </button>
                  <button className="cta-secondary" onClick={() => {
                    const text = `I built a ${path.length}-link chain and earned the "${badge.name}" badge! 🔗`;
                    if (navigator.share) {
                      navigator.share({ text });
                    } else {
                      navigator.clipboard.writeText(text);
                      alert('Copied to clipboard!');
                    }
                  }}>
                    Share your chain
                  </button>
                </div>

                <div className="other-badges">
                  <div className="other-badges-label">All badges</div>
                  <div className="other-badges-grid">
                    {allBadges.map(b => (
                      <div key={b.id} className={`other-badge ${b.id === badge.id ? 'earned' : ''}`}>
                        <span>{b.icon}</span>
                        <span>{b.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
